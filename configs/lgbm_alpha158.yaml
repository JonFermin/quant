# LightGBM Alpha158 Strategy Config
# -----------------------------------
# Trains a LightGBM model on QLib's Alpha158 feature set (158 hand-crafted
# technical alpha factors) and backtests a TopkDropout portfolio strategy
# on the S&P 500 universe.
#
# Data: US market (S&P 500)
# Train:  2008-01-01 to 2020-12-31
# Valid:  2021-01-01 to 2022-12-31
# Test:   2023-01-01 to 2025-12-31
#
# Usage:
#   qrun configs/lgbm_alpha158.yaml
#   or load programmatically via strategies/lgbm_alpha158.py

qlib_init:
  provider_uri: "~/.qlib/qlib_data/us_data"
  region: us

task:
  model:
    class: LGBModel
    module_path: qlib.contrib.model.gbdt
    kwargs:
      loss: mse
      colsample_bytree: 0.8879
      learning_rate: 0.0421
      subsample: 0.8789
      lambda_l1: 205.6999
      lambda_l2: 580.9768
      max_depth: 8
      num_leaves: 210
      num_threads: 20

  dataset:
    class: DatasetH
    module_path: qlib.data.dataset
    kwargs:
      handler:
        class: Alpha158
        module_path: qlib.contrib.data.handler
        kwargs:
          start_time: "2008-01-01"
          end_time: "2025-12-31"
          fit_start_time: "2008-01-01"
          fit_end_time: "2020-12-31"
          instruments: "sp500"
      segments:
        train: ["2008-01-01", "2020-12-31"]
        valid: ["2021-01-01", "2022-12-31"]
        test:  ["2023-01-01", "2025-12-31"]

port_analysis_config:
  strategy:
    class: TopkDropoutStrategy
    module_path: qlib.contrib.strategy
    kwargs:
      signal: <PRED>
      topk: 50
      n_drop: 5

  backtest:
    start_time: "2023-01-01"
    end_time: "2025-12-31"
    account: 100000000
    benchmark: "SPY"
    exchange_kwargs:
      limit_threshold: 0.095
      deal_price: "close"
      open_cost: 0.0005
      close_cost: 0.0015
      min_cost: 5
